name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests with coverage
        working-directory: java-assignment
        run: ./mvnw verify -Dquarkus.container-image.build=false
        env:
          # Allow Quarkus Dev Services (Testcontainers) to spin up PostgreSQL
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Upload JaCoCo HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: java-assignment/target/site/jacoco/
          retention-days: 14

      - name: Publish coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report
          path: java-assignment/target/jacoco.xml
          retention-days: 14
